name: PR Title

# PRs are squash-merged, so the PR title becomes the commit semantic-release
# reads. Enforce Conventional Commits on the title. Uses `pull_request` (never
# `pull_request_target`): the action reads the title from the event payload, so
# no write access or PR checkout is required.
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR title is a Conventional Commit
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
